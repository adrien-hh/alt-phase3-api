spring.application.name=alt-phase3-api
server.port=8081

# Database connexion
spring.datasource.url=jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:database}
spring.datasource.username=${DB_USERNAME:user}
spring.datasource.password=${DB_PASSWORD:password}

# Don't change the database
spring.jpa.hibernate.ddl-auto=validate